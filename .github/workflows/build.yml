name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle 6.9
        run: |
          cd /tmp
          curl -sL https://services.gradle.org/distributions/gradle-6.9-bin.zip -o gradle.zip
          unzip -q gradle.zip
          rm gradle.zip
          echo "/tmp/gradle-6.9/bin" >> $GITHUB_PATH

      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -o sdk.zip
          unzip -q sdk.zip
          mv cmdline-tools latest
          rm sdk.zip
          echo "y" | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk "platform-tools" "platforms;android-30" "build-tools;30.0.3" > /dev/null

      - name: Build APK
        env:
          ANDROID_HOME: /home/runner/android-sdk
        run: |
          export ANDROID_HOME=/home/runner/android-sdk
          gradle :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoFileImporter
          path: app/build/outputs/apk/debug/app-debug.apk
